{% extends 'base.html' %}
{% block title %}Server Error - Helping Hands{% endblock %}

{% block content %}
<section style="min-height: calc(100vh - 140px); display: flex; align-items: center; justify-content: center; padding: 4rem 1rem; text-align: center;">
    <div class="glass-card" style="width: 100%; max-width: 500px; padding: 3rem;">
        <i class="fa-solid fa-bug" style="font-size: 5rem; color: var(--primary); margin-bottom: 1.5rem;"></i>
        <h1 style="font-size: 3rem; font-weight: 800; margin-bottom: 0.5rem; color: var(--text-primary);">500</h1>
        <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem;">Internal Server Error</h2>
        <p style="color: var(--text-secondary); line-height: 1.6; margin-bottom: 2rem;">
            Oops! Something went wrong on our servers. Our development team has been notified. Please try refreshing or return later.
        </p>
        <div style="display: flex; gap: 1rem; justify-content: center;">
            <button onclick="window.location.reload()" class="btn btn-outline"><i class="fa-solid fa-rotate-right"></i> Refresh Page</button>
            <a href="{% url 'index' %}" class="btn btn-primary"><i class="fa-solid fa-house"></i> Home</a>
        </div>
    </div>
</section>
{% endblock %}
