{% extends 'base.html' %}
{% block title %}Page Not Found - Helping Hands{% endblock %}

{% block content %}
<section style="min-height: calc(100vh - 140px); display: flex; align-items: center; justify-content: center; padding: 4rem 1rem; text-align: center;">
    <div class="glass-card" style="width: 100%; max-width: 500px; padding: 3rem;">
        <i class="fa-solid fa-triangle-exclamation" style="font-size: 5rem; color: var(--danger); margin-bottom: 1.5rem;"></i>
        <h1 style="font-size: 3rem; font-weight: 800; margin-bottom: 0.5rem; color: var(--text-primary);">404</h1>
        <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem;">Page Not Found</h2>
        <p style="color: var(--text-secondary); line-height: 1.6; margin-bottom: 2rem;">
            The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
        </p>
        <a href="{% url 'index' %}" class="btn btn-primary"><i class="fa-solid fa-house"></i> Back to Home</a>
    </div>
</section>
{% endblock %}
